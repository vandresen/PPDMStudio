name: Build and Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish PPDMStudio/PPDMStudio.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Zip the output
        run: Compress-Archive -Path ./publish/* -DestinationPath ./PPDMStudio.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./PPDMStudio.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
